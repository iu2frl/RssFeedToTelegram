name: Push Docker image to the Hub

on:
  push:
    # Pattern matched against refs/tags
    tags:        
      - '*'           # Push events to every tag not containing

  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-latest-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions-ecosystem/action-get-latest-tag@v1
        id: get-latest-tag
      - name: Print latest tag
        run: echo ${{ steps.get-latest-tag.outputs.tag }}

  docker-build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push amd64 image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: iu2frl/telegram-rss:${{ needs.prepare.outputs.tag }}-amd64

  docker-build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push arm64 image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: iu2frl/telegram-rss:${{ needs.prepare.outputs.tag }}-arm64

  docker-publish-manifest:
    needs:
      - prepare
      - docker-build-amd64
      - docker-build-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push multi-arch tags
        run: |
          docker buildx imagetools create \
            -t iu2frl/telegram-rss:${{ needs.prepare.outputs.tag }} \
            -t iu2frl/telegram-rss:latest \
            iu2frl/telegram-rss:${{ needs.prepare.outputs.tag }}-amd64 \
            iu2frl/telegram-rss:${{ needs.prepare.outputs.tag }}-arm64
